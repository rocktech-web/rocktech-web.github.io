<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>स्मार्ट फर्द बटवारा निर्माण</title>
    <style>
        /* =========================================
           GLOBAL VARIABLES & PREMIUM CORPORATE THEME
           ========================================= */
        :root {
            /* Theme Colors (Matched with PLM Suite) */
            --bg-body: #F1F5F9;       /* Soft Slate 50 */
            --bg-surface: #FFFFFF;    /* Pure White */
            --border-color: #E2E8F0;  /* Slate 200 */
            
            --primary: #1E293B;       /* Deep Navy / Slate 800 */
            --primary-light: #334155; /* Slate 700 */
            
            --accent: #0EA5E9;        /* Sky Blue 500 */
            --accent-hover: #0284C7;  /* Sky Blue 600 */
            --accent-light: #E0F2FE;  /* Sky Blue 50 */
            
            --text-main: #334155;     /* Slate 700 */
            --text-muted: #64748B;    /* Slate 500 */
            
            --shadow-sm: 0 1px 3px rgba(15, 23, 42, 0.05), 0 1px 2px rgba(15, 23, 42, 0.1);
            --shadow-md: 0 4px 6px -1px rgba(15, 23, 42, 0.05), 0 2px 4px -1px rgba(15, 23, 42, 0.03);
            
            --page-width: 297mm; 
            --page-height: 210mm;
            --transition: all 0.2s ease;
        }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-body); }
        ::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94A3B8; }

        html, body { 
            font-family: 'Poppins', 'Segoe UI', sans-serif; 
            background: var(--bg-body); 
            margin: 0; padding: 0; 
            height: 100vh; display: flex; flex-direction: column; 
            overflow: hidden; color: var(--text-main);
        }
        
        /* =========================================
           TOP CONTROL PANEL
           ========================================= */
        .top-container { 
            flex-shrink: 0; background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px);
            padding: 15px 25px; box-shadow: var(--shadow-md); z-index: 1000; 
            display: flex; flex-direction: column; gap: 12px; border-bottom: 1px solid var(--border-color);
        }
        
        .controls-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        
        /* Action Bar (Highlighted Area) */
        .action-bar { 
            background: var(--bg-body); padding: 10px 15px; border-radius: 8px; 
            display: flex; gap: 15px; border: 1px solid var(--border-color); 
            align-items: center; flex-wrap: wrap; box-shadow: inset 0 1px 2px rgba(0,0,0,0.02);
        }
        .action-group { display: flex; gap: 6px; align-items: center; border-right: 2px solid var(--border-color); padding-right: 15px; }
        .action-group:last-child { border-right: none; }
        .action-label { font-size: 13px; font-weight: 600; color: var(--primary); }

        /* Inputs & Textareas */
        .top-container textarea { 
            width: 100%; height: 45px; padding: 10px 14px; border: 1px solid var(--border-color); 
            border-radius: 8px; font-family: inherit; font-size: 13px; color: var(--text-main);
            box-shadow: inset 0 1px 2px rgba(0,0,0,0.02); transition: var(--transition); outline: none; box-sizing: border-box;
        }
        .top-container textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-light); }

        select { 
            padding: 8px 12px; border: 1px solid var(--border-color); font-size: 13px; 
            border-radius: 8px; outline: none; background: #FFFFFF; color: var(--text-main);
            transition: var(--transition); font-weight: 500; cursor: pointer;
        }
        select:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-light); }

        /* Buttons */
        button { 
            padding: 8px 14px; background: var(--primary-light); color: white; 
            border: none; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 500;
            transition: var(--transition); box-shadow: var(--shadow-sm); display: flex; align-items: center; gap: 4px;
        }
        button:hover { background: var(--primary); transform: translateY(-1px); box-shadow: var(--shadow-md); }
        button:active { transform: translateY(0); }
        
        button.danger { background: #EF4444; } button.danger:hover { background: #DC2626; }
        button.success { background: #10B981; } button.success:hover { background: #059669; }
        button.file-btn { background: var(--accent); } button.file-btn:hover { background: var(--accent-hover); }
        button.excel-btn { background: #059669; } button.excel-btn:hover { background: #047857; } 

        #current-file-name { 
            font-size: 12px; background: var(--accent-light); color: var(--accent-hover); 
            padding: 6px 12px; border-radius: 6px; font-weight: 600; display: inline-block; 
            margin-left: auto; border: 1px solid #BAE6FD; font-family: 'Courier New', monospace;
        }
        .unsaved { background: #FEF2F2 !important; color: #EF4444 !important; border-color: #FCA5A5 !important; }

        /* =========================================
           CANVAS & PAGE LAYOUT
           ========================================= */
        .canvas-wrapper {
            flex-grow: 1; width: 100%; overflow: auto; background: var(--bg-body);
            padding: 30px 20px; box-sizing: border-box; text-align: center; 
        }

        .page {
            background: var(--bg-surface); box-shadow: var(--shadow-md);
            padding: 15mm; position: relative; box-sizing: border-box; 
            width: var(--page-width); min-height: var(--page-height);
            display: inline-block; text-align: left; margin: 0 auto; 
            transition: width 0.3s ease; border: 1px solid var(--border-color); border-radius: 4px;
        }

        .office-heading { text-align: center; font-size: 16pt; font-weight: bold; margin-bottom: 15px; width: 100%; display: block; color: #000; }
        .village-input { border-bottom: 1px dashed #000; display: inline-block; min-width: 120px; padding: 0 5px; outline: none; font-weight: bold; }
        .village-input:empty:before { content: '...................'; color: #aaa; font-weight: normal; }

        /* =========================================
           TABLE DESIGN (HIGH READABILITY)
           ========================================= */
        table { width: 100%; border-collapse: collapse; table-layout: fixed; font-size: 13px; color: #000; }
        th, td { border: 1px solid #000; padding: 6px 8px; text-align: center; vertical-align: middle; position: relative; word-wrap: break-word; }
        
        .header-bg { font-weight: bold; background-color: var(--bg-body); color: #000; }
        .total-row { font-weight: bold; background-color: #E2E8F0; } /* Slate 200 for strong totals */
        .owner-header { background-color: var(--accent-light) !important; color: #000; }
        
        .error-row { background-color: #FEF2F2 !important; } /* Soft red for errors */
        .selected-cell { background-color: #FFFBEB !important; outline: 2px solid #F59E0B; z-index: 5; } /* Soft yellow focus */
        
        .row-diff { display: block; font-size: 11px; margin-top: 4px; user-select: none; pointer-events: none; font-family: monospace; font-weight: 600; }
        .total-diff { font-size: 11px; font-family: monospace; font-weight: 600; }
        
        .resizer { position: absolute; right: 0; top: 0; bottom: 0; width: 5px; cursor: col-resize; z-index: 10; transition: background 0.2s; }
        .resizer:hover { background: var(--accent); }

        .bottom-note { 
            margin-top: 20px; font-size: 14px; font-weight: bold; width: 100%; 
            text-align: center; border: none; outline: none; background: transparent; 
            font-family: inherit; display: block; padding: 5px; color: #000;
        }

        /* =========================================
           PRINT MEDIA QUERIES (CLEAN NO-THEME PRINT)
           ========================================= */
        @media print {
            html, body { overflow: visible !important; width: auto !important; height: auto !important; margin: 0; padding: 0; display: block !important; background: white !important; }
            .top-container { display: none !important; }
            .canvas-wrapper { display: block !important; overflow: visible !important; height: auto !important; padding: 0 !important; margin: 0 !important; text-align: left !important; background: white !important; }
            
            .page { margin: 0 !important; box-shadow: none !important; border: none !important; padding: 0 !important; width: 100% !important; height: auto !important; page-break-inside: avoid; display: block !important; zoom: 1 !important; border-radius: 0; }
            ::-webkit-scrollbar { display: none !important; }
            * { scrollbar-width: none !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            
            table, th, td { border: 1px solid #000 !important; }
            .header-bg { background-color: #f2f2f2 !important; }
            .total-row { background-color: #e6e6e6 !important; }
            .owner-header { background-color: #e8f4f8 !important; }
            
            .resizer, .row-diff, .total-diff { display: none !important; }
            .selected-cell { background-color: transparent !important; outline: none !important; }
            tfoot { display: table-row-group; } 
            
            @page { size: auto; margin: 10mm; @bottom-center { content: "Page " counter(page) " to " counter(pages); } } 
        }
    </style>
</head>
<body>

<div class="top-container">
    <div class="controls-row">
        <button class="file-btn" onclick="App.createNewFile()" style="background:#16a085;">📄 नई फ़ाइल</button>
        <button class="file-btn" onclick="App.openFile()">📂 ओपन</button>
        <button class="file-btn" onclick="App.saveFile()">💾 सेव</button>
        <button class="file-btn" onclick="App.saveAsFile()">💾 सेव ऐज़</button>

        <span style="border-left: 2px solid #ccc; height: 20px; margin: 0 5px;"></span>
        <button onclick="App.undo()" style="background:#7f8c8d;" title="Undo (Ctrl+Z)">↩ Undo</button>
        <button onclick="App.redo()" style="background:#7f8c8d;" title="Redo (Ctrl+Y)">↪ Redo</button>

        <span style="border-left: 2px solid #ccc; height: 20px; margin: 0 5px;"></span>

        <select id="format-select" onchange="App.changeFormat()">
            <option value="1">प्रारूप 1</option><option value="2" selected>प्रारूप 2</option>
            <option value="3">प्रारूप 3</option><option value="4">प्रारूप 4</option>
        </select>
        <select id="paper-select" onchange="App.changePaperSize()">
            <option value="A4">A4</option><option value="A3">A3</option><option value="A2">A2</option><option value="A1">A1</option>
        </select>
        <select id="orientation-select" onchange="App.changePaperSize()">
            <option value="landscape">लैंडस्केप</option><option value="portrait">पोर्ट्रेट</option>
        </select>
        
        <select id="font-select" onchange="App.changeFont()" style="background:#e8f4f8; font-weight:bold;">
            <option value="'Nirmala UI', sans-serif">फॉन्ट: Nirmala UI</option>
            <option value="'Kokila', serif">फॉन्ट: Kokila (कोकिला)</option>
            <option value="'Poppins', sans-serif">फॉन्ट: Poppins</option>
            <option value="'Aparajita', serif">फॉन्ट: Aparajita (अपराजिता)</option>
        </select>

        <button class="success" onclick="App.toggleGramColumn()">+ ग्राम कॉलम</button>
        <button class="excel-btn" onclick="App.exportToExcel()">📊 Excel Export</button>
        
        <span id="current-file-name">📄 फ़ाइल: नई फ़ाइल</span>
        <button onclick="window.print()">🖨️ Print / PDF</button>
    </div>

    <div class="controls-row action-bar">
        <div class="action-group">
            <span class="action-label" id="lbl-khata" style="color:#e67e22;">खाता <b>(-)</b>:</span>
            <button onclick="App.actionKhata('add-up')">⬆ ऊपर जोड़ें</button>
            <button onclick="App.actionKhata('add-down')">⬇ नीचे जोड़ें</button>
            <button onclick="App.actionKhata('move-up')" style="background:#f39c12;">⬆ ऊपर खिसकाएं</button>
            <button onclick="App.actionKhata('move-down')" style="background:#f39c12;">⬇ नीचे खिसकाएं</button>
            <button onclick="App.actionKhata('del')" class="danger">🗑️ हटाएं</button>
        </div>
        
        <div class="action-group">
            <span class="action-label" id="lbl-row" style="color:#8e44ad;">रो <b>(-)</b>:</span>
            <button onclick="App.actionRow('split')" style="background:#9b59b6;">➗ स्प्लिट (Split)</button>
        </div>

        <div class="action-group">
            <span class="action-label" id="lbl-set" style="color:#e67e22;">सेट <b>(-)</b>:</span>
            <button onclick="App.actionSet('add-left')">◀ बाएं जोड़ें</button>
            <button onclick="App.actionSet('add-right')">▶ दाएं जोड़ें</button>
            <button onclick="App.actionSet('move-left')" style="background:#f39c12;">⬅ बाएं खिसकाएं</button>
            <button onclick="App.actionSet('move-right')" style="background:#f39c12;">➡ दाएं खिसकाएं</button>
            <button onclick="App.actionSet('del')" class="danger">🗑️ हटाएं</button>
        </div>
    </div>

    <div class="controls-row">
        <div style="flex: 1;">
            <textarea id="combined-text" placeholder="B1 Extractor से प्राप्त 'Extracted Data (खसरा एवं भूमिस्वामी विवरण)' को यहाँ एक साथ पेस्ट करें..." oninput="App.markDirty()"></textarea>
        </div>
        <button onclick="App.processData()" style="height: 45px; font-size: 14px; padding: 0 20px; background: #e67e22;">डेटा जोड़ें ⚡</button>
    </div>
</div>

<div class="canvas-wrapper" id="canvas-area">
    <div id="print-page" class="page">
        <div class="office-heading">
            बटवारा प्रस्ताव (ग्राम- <span contenteditable="true" class="village-input" id="village-name"></span>)
        </div>
        <table id="batwara-table">
            <colgroup id="table-colgroup"></colgroup>
            <thead id="table-head"></thead>
            <tbody id="table-body"></tbody>
            <tfoot id="table-foot"></tfoot>
        </table>
        <div contenteditable="true" class="bottom-note" oninput="App.markDirty()">उपरोक्त बटवारा प्रस्ताव आवेदक व अनावेदक के स्वत्व के आधार पर तैयार किया गया है।</div>
    </div>
</div>

<script>
const App = (function() {
    let state = { format: '2', font: "'Nirmala UI', sans-serif", proposedSets: 1, hasGram: false, data: [], colsWidth: {}, headerOwners: [] };
    let fileHandle = null; 
    let currentFileName = "नई फ़ाइल";
    let activeKhata = null;
    let activeKhasra = null; 
    let activeSet = null;
    let isDirty = false; 
    
    // मजबूत Undo/Redo सिस्टम
    let historyStack = [];
    let historyIndex = -1;

    const PAPER_DIMS = { 'A4': {w: 210, h: 297}, 'A3': {w: 297, h: 420}, 'A2': {w: 420, h: 594}, 'A1': {w: 594, h: 841} };

    document.addEventListener('keydown', function(e) {
        if (e.target.isContentEditable || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'INPUT') return;
        if (e.ctrlKey && e.key === 'z') { e.preventDefault(); undo(); }
        if (e.ctrlKey && e.key === 'y') { e.preventDefault(); redo(); }
    });

    function saveState() {
        syncTableToState();
        let str = JSON.stringify(state);
        if (historyIndex >= 0 && historyStack[historyIndex] === str) return; 
        
        historyStack = historyStack.slice(0, historyIndex + 1);
        historyStack.push(str);
        historyIndex++;
        
        if(historyStack.length > 50) { historyStack.shift(); historyIndex--; }
    }

    function undo() {
        if(document.activeElement) document.activeElement.blur(); 
        if (historyIndex > 0) {
            historyIndex--;
            state = JSON.parse(historyStack[historyIndex]);
            renderTable();
        }
    }

    function redo() {
        if(document.activeElement) document.activeElement.blur();
        if (historyIndex < historyStack.length - 1) {
            historyIndex++;
            state = JSON.parse(historyStack[historyIndex]);
            renderTable();
        }
    }

    function markDirty() {
        if (!isDirty) {
            isDirty = true;
            let el = document.getElementById('current-file-name');
            el.innerText = `📄 फ़ाइल: ${currentFileName} *`;
            el.classList.add('unsaved');
        }
    }

    function clearDirty() {
        isDirty = false;
        let el = document.getElementById('current-file-name');
        el.innerText = `📄 फ़ाइल: ${currentFileName}`;
        el.classList.remove('unsaved');
    }

    function updateFileName(name) {
        currentFileName = name;
        clearDirty();
    }

    function createNewFile() {
        if (isDirty) {
            if (!confirm("आपके द्वारा किए गए बदलाव सेव नहीं हुए हैं। क्या आप बिना सेव किए नई फ़ाइल बनाना चाहते हैं?")) {
                return;
            }
        }
        window.onbeforeunload = null; 
        window.location.reload();
    }

    function getCurrentCols() {
        let cols = [ {n: 'क्र.', w: 40, f: 'sno'}, {n: 'खाता\nक्रमांक', w: 60, f: 'khata'}, {n: 'खसरा\nसंख्यांक', w: 60, link: 'khasra', f: 'khasra'}, {n: 'रकवा', w: 60, link: 'rakba', cls: 'c-rakba', f: 'rakba'}, {n: 'भूमि स्वामी', w: 150, f: 'owner'} ];
        if(state.hasGram) cols.unshift({n: 'ग्राम', w: 60, f: 'gram'});
        return cols;
    }
    
    const FORMATS = {
        '1': [ {n: 'खसरा\nसंख्यांक', w: 60, link: 'khasra', cls: 'p-khasra', f: 'p_khasra'}, {n: 'रकवा', w: 60, link: 'rakba', cls: 'p-rakba', f: 'p_rakba'}, {n: 'भूमि स्वामी', w: 120, f: 'p_owner'} ],
        '2': [ {n: 'खसरा\nसंख्यांक', w: 60, link: 'khasra', cls: 'p-khasra', f: 'p_khasra'}, {n: 'रकवा', w: 60, link: 'rakba', cls: 'p-rakba', f: 'p_rakba'}, {n: 'भूमि स्वामी', w: 120, f: 'p_owner'} ],
        '3': [ {n: 'खसरा\nसंख्यांक', w: 60, link: 'khasra', cls: 'p-khasra', f: 'p_khasra'}, {n: 'रकवा', w: 60, link: 'rakba', cls: 'p-rakba', f: 'p_rakba'} ]
    };

    function getProposedCols(setIndex) { return (state.format === '4') ? (setIndex === 0 ? FORMATS['1'] : FORMATS['3']) : FORMATS[state.format]; }

    function init() { 
        changePaperSize(); 
        renderTable(); 
        attachLiveCalculations(); 
        attachRowMergeLogic();
        attachSelectionLogic();
        attachZoomAndPanLogic();
        attachRowResizer(); 
        updateFileName("नई फ़ाइल");
        applyFont();
        saveState(); 

        window.addEventListener('beforeunload', function (e) {
            if (isDirty) { e.preventDefault(); e.returnValue = ''; }
        });
        document.getElementById('village-name').addEventListener('input', markDirty);
        
        document.addEventListener('focusout', function(e) {
            if(e.target.isContentEditable) { saveState(); }
        });
        document.addEventListener('input', function(e) {
            if(e.target.isContentEditable) { markDirty(); }
        });
    }

    function attachZoomAndPanLogic() {
        let currentZoom = 1;
        const pageEl = document.getElementById('print-page');
        const canvasArea = document.getElementById('canvas-area'); 
        
        canvasArea.addEventListener('wheel', function(e) {
            if(e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') return;

            if (e.ctrlKey) {
                e.preventDefault(); 
                if (e.deltaY < 0) currentZoom += 0.1; else currentZoom -= 0.1; 
                currentZoom = Math.min(Math.max(0.4, currentZoom), 3); 
                pageEl.style.zoom = currentZoom;
            } 
            else if (e.altKey || e.shiftKey) {
                e.preventDefault();
                canvasArea.scrollBy({ left: e.deltaY > 0 ? 150 : -150, behavior: 'auto' });
            }
        }, { passive: false });
    }

    function applyFont() {
        document.getElementById('print-page').style.fontFamily = state.font;
        document.getElementById('font-select').value = state.font;
    }

    function changeFont() {
        markDirty();
        state.font = document.getElementById('font-select').value;
        applyFont();
        saveState();
    }

    function getCleanText(td) {
        let clone = td.cloneNode(true);
        clone.querySelectorAll('.row-diff, .total-diff').forEach(e => e.remove());
        let text = clone.textContent || clone.innerText || '';
        return text.replace(/\(शेष[ः:]?\s*[\d\.]+\)/g, '').replace(/\(अधिक[ः:]?\s*[\d\.]+\)/g, '').trim();
    }

    function syncTableToState() {
        if (!state.headerOwners) state.headerOwners = [];
        document.querySelectorAll('th.owner-header').forEach(th => {
            let s = th.getAttribute('data-header-set');
            if(s !== null) state.headerOwners[s] = th.innerText.trim();
        });

        let rows = document.getElementById('table-body').querySelectorAll('tr');
        rows.forEach(tr => {
            if(tr.classList.contains('subtotal-row')) return; 

            let khataIdx = tr.getAttribute('data-khata-idx');
            let khasraIdx = tr.getAttribute('data-khasra-idx');
            if (khataIdx === null || khasraIdx === null) return;
            let item = state.data[khataIdx];
            let khasra = item.khasras[khasraIdx];
            
            khasra.h = tr.style.height ? parseFloat(tr.style.height) : null;

            khasra.c_ui = khasra.c_ui || {};
            khasra.p_ui = khasra.p_ui || [];
            if(!khasra.proposed) khasra.proposed = [];

            tr.querySelectorAll('td').forEach(td => {
                let field = td.getAttribute('data-field');
                let setIdx = td.getAttribute('data-set') || '';
                if(!field) return;

                let val = getCleanText(td); 
                let isHidden = td.style.display === 'none';
                let rs = td.getAttribute('rowspan') || 1;
                let disp = td.style.display || '';
                let ta = td.style.textAlign || '';

                if(setIdx === '') { 
                    if(!isHidden) {
                        if(field === 'gram') item.gram = val;
                        if(field === 'khata') item.khata = val;
                        if(field === 'owner') item.owners = val;
                    }
                    if(field === 'khasra') khasra.k = val;
                    if(field === 'rakba') khasra.r = val;
                    khasra.c_ui[field] = { rs, disp, ta };
                } else { 
                    if(!khasra.proposed[setIdx]) khasra.proposed[setIdx] = {k:'', r:'', o:''};
                    if(field === 'p_khasra') khasra.proposed[setIdx].k = val;
                    if(field === 'p_rakba') khasra.proposed[setIdx].r = val;
                    if(field === 'p_owner' && !isHidden) khasra.proposed[setIdx].o = val;
                    
                    if(!khasra.p_ui[setIdx]) khasra.p_ui[setIdx] = {};
                    khasra.p_ui[setIdx][field] = { rs, disp, ta };
                }
            });
        });
        state.village = document.getElementById('village-name').innerText;
    }

    function attachSelectionLogic() {
        document.getElementById('table-body').addEventListener('mousedown', function(e) {
            let td = e.target.closest('td');
            if(!td) return;
            
            document.querySelectorAll('.selected-cell').forEach(el => el.classList.remove('selected-cell'));
            td.classList.add('selected-cell');

            let ksIdx = tr ? tr.getAttribute('data-khasra-idx') : null;

                activeKhasra = parseInt(ksIdx);
                document.getElementById('lbl-row').innerHTML = `रो <b>(${activeKhasra + 1})</b> :`;

                activeKhasra = null;

            }

                document.getElementById('lbl-set').innerHTML = `सेट <b>(-)</b> :`;

    function actionKhata(action) {
        if(activeKhata === null) return alert("कृपया पहले टेबल में किसी 'खाते' के सेल पर क्लिक करें।");
        markDirty();
        syncTableToState();
        
        let i = activeKhata;
        let emptyKhata = { khata: '', owners: '', khasras: [{ k:'', r:'', c_ui:{}, p_ui:[], proposed:[] }] };
        
        if(action === 'add-up' || action === 'add-down') {
            let insertPos = action === 'add-up' ? i : i + 1;
            state.data.splice(insertPos, 0, emptyKhata);
            activeKhata = insertPos;
            document.getElementById('lbl-khata').innerHTML = `खाता <b>(${activeKhata + 1})</b> :`;
        }
        else if(action === 'del') {
            if(state.data.length <= 1) return alert("कम से कम एक खाता होना अनिवार्य है!");
            if(confirm("क्या आप इस खाते को हटाना चाहते हैं?")) {
                state.data.splice(i, 1);
                activeKhata = null;
                document.getElementById('lbl-khata').innerHTML = `खाता <b>(-)</b> :`;
            }
        }
        else if(action === 'move-up' && i > 0) {
            [state.data[i-1], state.data[i]] = [state.data[i], state.data[i-1]];
            activeKhata = i - 1;
            document.getElementById('lbl-khata').innerHTML = `खाता <b>(${activeKhata + 1})</b> :`;
        }
        else if(action === 'move-down' && i < state.data.length - 1) {
            [state.data[i+1], state.data[i]] = [state.data[i], state.data[i+1]];
            activeKhata = i + 1;
            document.getElementById('lbl-khata').innerHTML = `खाता <b>(${activeKhata + 1})</b> :`;
        }
        renderTable();
        saveState();
    }

    function actionRow(action) {
        if(activeKhata === null || activeKhasra === null) return alert("कृपया पहले टेबल में किसी 'रो' पर क्लिक करें।");
        
        // नया बदलाव: स्प्लिट केवल प्रारूप 2 में ही काम करेगा
        if (action === 'split' && state.format !== '2') {
            return alert("स्प्लिट (Split) का विकल्प केवल 'प्रारूप 2' में ही उपलब्ध है। कृपया ऊपर से 'प्रारूप 2' चुनें।");
        }

        markDirty(); 
        syncTableToState(); 
        
        let kh = state.data[activeKhata]; 
        let ksIdx = activeKhasra; 
        let currentKhasra = kh.khasras[ksIdx]; 
        
        if (action === 'split') {
            let parts = prompt("इस चयनित कॉलम सेट को कितने भागों (Rows) में स्प्लिट करना चाहते हैं?", "2");
            parts = parseInt(parts);
            if(isNaN(parts) || parts <= 1) return;

            let addedRows = parts - 1;
            let c_fields = ['gram', 'sno', 'khata', 'khasra', 'rakba', 'owner']; 
            let p_fields = ['p_khasra', 'p_rakba', 'p_owner']; 

            let splitGroupId = currentKhasra.splitId || Date.now().toString();
            currentKhasra.splitId = splitGroupId;

            c_fields.forEach(f => {
                let rootIdx = ksIdx;
                while (rootIdx >= 0 && kh.khasras[rootIdx].c_ui && kh.khasras[rootIdx].c_ui[f] && kh.khasras[rootIdx].c_ui[f].disp === 'none') rootIdx--;
                if (rootIdx >= 0) {
                    let rootKs = kh.khasras[rootIdx];
                    if(!rootKs.c_ui) rootKs.c_ui = {};
                    let currentRS = parseInt(rootKs.c_ui[f] ? rootKs.c_ui[f].rs : 1);
                    rootKs.c_ui[f] = { rs: currentRS + addedRows, disp: '', ta: (f==='owner'?'left':'center') };
                }
            });

            for(let s = 0; s < state.proposedSets; s++) {
                if (s !== activeSet) {
                    p_fields.forEach(f => {
                        let rootIdx = ksIdx;
                        while (rootIdx >= 0 && kh.khasras[rootIdx].p_ui && kh.khasras[rootIdx].p_ui[s] && kh.khasras[rootIdx].p_ui[s][f] && kh.khasras[rootIdx].p_ui[s][f].disp === 'none') rootIdx--;
                        if (rootIdx >= 0) {
                            let rootKs = kh.khasras[rootIdx];
                            if(!rootKs.p_ui) rootKs.p_ui = [];
                            if(!rootKs.p_ui[s]) rootKs.p_ui[s] = {};
                            let currentRS = parseInt(rootKs.p_ui[s][f] ? rootKs.p_ui[s][f].rs : 1);
                            rootKs.p_ui[s][f] = { rs: currentRS + addedRows, disp: '', ta: (f==='p_owner'?'left':'center') };
                        }
                    });
                }
            }

            let baseKhasra = currentKhasra.k || ""; 
            
            if(activeSet !== null) {
                if(!currentKhasra.proposed[activeSet]) currentKhasra.proposed[activeSet] = {k:'', r:'', o:''};
                currentKhasra.proposed[activeSet].k = ""; 
                currentKhasra.proposed[activeSet].r = "";
            }

            for(let p = 1; p <= addedRows; p++) {
                let newKs = {
                    k: baseKhasra, 
                    splitId: splitGroupId,
                    r: currentKhasra.r,
                    c_ui: {}, 
                    p_ui: [], 
                    proposed: []
                };

                c_fields.forEach(f => {
                    newKs.c_ui[f] = { rs: 1, disp: 'none', ta: '' };
                });

                for(let s = 0; s < state.proposedSets; s++) {
                    newKs.proposed.push({ k: '', r: '', o: '' });
                    newKs.p_ui[s] = {};
                    p_fields.forEach(f => {
                        newKs.p_ui[s][f] = { rs: 1, disp: (s === activeSet ? '' : 'none'), ta: '' };
                    });
                }
                kh.khasras.splice(ksIdx + p, 0, newKs);
            }
        } 
        // डिलीट (del) वाला ब्लॉक यहाँ से हटा दिया गया है
        
        renderTable(); 
        saveState(); 
    }

    // === यहाँ बदलाव किया गया है ===
    // इसे App के return में एक्सपोज़ किया गया है ताकि HTML इसे कॉल कर सके।
    function handleRakbaInput(khIdx, ksIdx, setIdx, rawRakbaValue) {
        // 1. फालतू स्पेस या न्यू-लाइन हटा दें
        let cleanValue = rawRakbaValue.replace(/\n/g, '').trim();
        
        let kh = state.data[khIdx];
        let ks = kh.khasras[ksIdx];
        
        // 2. रकवा और हिस्से (Fraction) की स्मार्ट गणना करें
        let formattedRakba = "";
        
        if (cleanValue !== "") {
            // यदि यूज़र ने हिस्सा (जैसे 1/2 या 1/3) डाला है
            if (cleanValue.includes('/')) {
                let parts = cleanValue.split('/');
                if (parts.length === 2 && !isNaN(parts[0]) && !isNaN(parts[1]) && parseFloat(parts[1]) !== 0) {
                    let origRakba = parseFloat(ks.r) || 0; // वर्तमान खसरे का मूल (कुल) रकवा
                    let fractionVal = origRakba * (parseFloat(parts[0]) / parseFloat(parts[1]));
                    formattedRakba = fractionVal.toFixed(4); // हिस्से को 4 डिजिट में बदलें
                } else {
                    formattedRakba = cleanValue; // यदि यूज़र ने गलत फॉर्मेट डाला है
                }
            } 
            // यदि यूज़र ने सीधा नंबर (जैसे 0.02) डाला है
            else {
                let floatVal = parseFloat(cleanValue);
                if (!isNaN(floatVal)) {
                    formattedRakba = floatVal.toFixed(4);
                } else {
                    formattedRakba = cleanValue; 
                }
            }
        }

        // 3. फॉर्मेटेड रकवा को सेव करें
        if (!ks.proposed[setIdx]) ks.proposed[setIdx] = { k: '', r: '', o: '' };
        ks.proposed[setIdx].r = formattedRakba;

        // बेस खसरा प्राप्त करें (जैसे 966/1/1...)
        let baseKhasra = ks.k; 
        if (!baseKhasra) {
            renderTable();
            saveState();
            return;
        }

        let splitGroupId = ks.splitId;
        
        // यदि रो स्प्लिट है तो पूरा ग्रुप लें, अन्यथा केवल इसी सिंगल रो को लें
        let groupToProcess = splitGroupId ? kh.khasras.filter(row => row.splitId === splitGroupId) : [ks];

        let batankanCounter = 1;

        // सभी प्रस्तावित सेट्स (कॉलम) में बाएं से दाएं जाएं
        for (let s = 0; s < state.proposedSets; s++) {
            
            // प्रत्येक सेट के अंदर मौजूद रोज़ (ऊपर से नीचे) चेक करें
            groupToProcess.forEach(row => {
                if (!row.proposed[s]) row.proposed[s] = { k: '', r: '', o: '' };
                let pData = row.proposed[s];

                // यह चेक करें कि क्या यह सेल मर्ज होने के कारण छिपी (hidden) तो नहीं है?
                let isHidden = false;
                if (row.p_ui && row.p_ui[s] && row.p_ui[s]['p_rakba'] && row.p_ui[s]['p_rakba'].disp === 'none') {
                    isHidden = true;
                }

                if (isHidden) {
                    pData.k = ""; // छिपी हुई रो को खसरा नंबर नहीं देना है
                    return;
                }

                let rVal = pData.r ? pData.r.toString().trim() : "";
                let numericRakba = parseFloat(rVal);
                
                // यदि रकवा भरा हुआ है और शून्य (0.0000) से अधिक है, तो क्रम से बटांक दें
                if (!isNaN(numericRakba) && numericRakba > 0) {
                    pData.k = baseKhasra + "/" + batankanCounter;
                    batankanCounter++;
                } else {
                    pData.k = ""; // यदि रकवा खाली या शून्य है, तो खसरा भी खाली कर दें
                }
            });
        }

        renderTable(); 
        saveState();   
    }

    function actionSet(action) {
        if(activeSet === null) return alert("कृपया पहले 'प्रस्तावित विभाजन सूची' के किसी सेल पर क्लिक करें।");
        markDirty();
        syncTableToState();
        
        let i = activeSet;

        if(action === 'add-left' || action === 'add-right') {
            let insertPos = action === 'add-left' ? i : i + 1;
            state.proposedSets++;
            state.headerOwners.splice(insertPos, 0, 'नया भूमि स्वामी');
            state.data.forEach(kh => kh.khasras.forEach(ks => {
                ks.proposed.splice(insertPos, 0, {k:'', r:'', o:''});
                ks.p_ui.splice(insertPos, 0, {});
            }));
            activeSet = insertPos;
            document.getElementById('lbl-set').innerHTML = `सेट <b>(${activeSet + 1})</b> :`;
        }
        if(action === 'del') {
            if(state.proposedSets <= 1) return alert("कम से कम एक सेट होना अनिवार्य है!");
            if(confirm("क्या आप चयनित कॉलम सेट को हटाना चाहते हैं?")) {
                state.proposedSets--;
                state.headerOwners.splice(i, 1);
                state.data.forEach(kh => kh.khasras.forEach(ks => {
                    ks.proposed.splice(i, 1);
                    ks.p_ui.splice(i, 1);
                }));
                activeSet = null;
                document.getElementById('lbl-set').innerHTML = `सेट <b>(-)</b> :`;
            }
        }
        if(action === 'move-left' && i > 0) {
            [state.headerOwners[i-1], state.headerOwners[i]] = [state.headerOwners[i], state.headerOwners[i-1]];
            state.data.forEach(kh => kh.khasras.forEach(ks => {
                [ks.proposed[i-1], ks.proposed[i]] = [ks.proposed[i], ks.proposed[i-1]];
                [ks.p_ui[i-1], ks.p_ui[i]] = [ks.p_ui[i], ks.p_ui[i-1]];
            }));
            activeSet = i - 1;
            document.getElementById('lbl-set').innerHTML = `सेट <b>(${activeSet + 1})</b> :`;
        }
        if(action === 'move-right' && i < state.proposedSets - 1) {
            [state.headerOwners[i+1], state.headerOwners[i]] = [state.headerOwners[i], state.headerOwners[i+1]];
            state.data.forEach(kh => kh.khasras.forEach(ks => {
                [ks.proposed[i+1], ks.proposed[i]] = [ks.proposed[i], ks.proposed[i+1]];
                [ks.p_ui[i+1], ks.p_ui[i]] = [ks.p_ui[i], ks.p_ui[i+1]];
            }));
            activeSet = i + 1;
            document.getElementById('lbl-set').innerHTML = `सेट <b>(${activeSet + 1})</b> :`;
        }
        renderTable();
        saveState();
    }

    function encryptData(obj) { return btoa(encodeURIComponent(JSON.stringify(obj))); }
    function decryptData(str) { return JSON.parse(decodeURIComponent(atob(str))); }

    async function openFile() {
        if (isDirty) {
            if (!confirm("आपके बदलाव सेव नहीं हुए हैं। क्या आप बिना सेव किए दूसरी फ़ाइल खोलना चाहते हैं?")) return;
        }
        try {
            if (window.showOpenFilePicker) {
                [fileHandle] = await window.showOpenFilePicker({ types: [{ description: 'Rock Batwara File', accept: {'application/rock': ['.rock','.json']} }] });
                const file = await fileHandle.getFile();
                const text = await file.text();
                state = decryptData(text); 
                document.getElementById('format-select').value = state.format;
                document.getElementById('village-name').innerText = state.village || '';
                if(!state.font) state.font = "'Nirmala UI', sans-serif";
                applyFont();
                historyStack = []; historyIndex = -1;
                renderTable();
                saveState();
                updateFileName(file.name);
            } else {
                let input = document.createElement('input');
                input.type = 'file';
                input.accept = '.rock,.json';
                input.onchange = e => {
                    let file = e.target.files[0];
                    if(!file) return;
                    let reader = new FileReader();
                    reader.onload = function(event) {
                        state = decryptData(event.target.result);
                        document.getElementById('format-select').value = state.format;
                        document.getElementById('village-name').innerText = state.village || '';
                        if(!state.font) state.font = "'Nirmala UI', sans-serif";
                        applyFont();
                        historyStack = []; historyIndex = -1;
                        renderTable();
                        saveState();
                        updateFileName(file.name);
                    };
                    reader.readAsText(file);
                };
                input.click();
            }
        } catch (err) { console.error(err); }
    }

    async function saveFile() {
        syncTableToState();
        try {
            if (window.showSaveFilePicker) {
                if (!fileHandle) { return await saveAsFile(); }
                const writable = await fileHandle.createWritable();
                await writable.write(encryptData(state));
                await writable.close();
                clearDirty();
                alert("फ़ाइल सफलतापूर्वक अपडेट (Save) हो गई।");
            } else { saveAsBlob(); }
        } catch (error) { console.error(error); }
    }

    async function saveAsFile() {
        syncTableToState();
        try {
            if (window.showSaveFilePicker) {
                let vName = document.getElementById('village-name').innerText.trim() || 'Project';
                fileHandle = await window.showSaveFilePicker({ 
                    suggestedName: `Batwara_${vName}.rock`,
                    types: [{ description: 'Rock Batwara File', accept: {'application/rock': ['.rock']} }] 
                });
                const writable = await fileHandle.createWritable();
                await writable.write(encryptData(state));
                await writable.close();
                updateFileName(fileHandle.name);
                alert("नई फ़ाइल (Save As) सफलतापूर्वक सेव हो गई।");
            } else { saveAsBlob(); }
        } catch (error) { console.error(error); }
    }

    function saveAsBlob() {
        let dataStr = encryptData(state);
        let blob = new Blob([dataStr], {type: "text/plain"});
        let url = URL.createObjectURL(blob);
        let a = document.createElement('a');
        a.href = url;
        let vName = document.getElementById('village-name').innerText.trim();
        let fName = vName ? `Batwara_${vName}.rock` : 'Batwara_Project.rock';
        a.download = fName;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        updateFileName(fName);
    }

    function toggleGramColumn() { markDirty(); state.hasGram = !state.hasGram; renderTable(); saveState(); }
    
    function changePaperSize() {

        const size = document.getElementById('paper-select').value;
        const orient = document.getElementById('orientation-select').value;
        const root = document.documentElement;
        if(orient === 'landscape') { root.style.setProperty('--page-width', PAPER_DIMS[size].h + 'mm'); root.style.setProperty('--page-height', PAPER_DIMS[size].w + 'mm'); } 
        else { root.style.setProperty('--page-width', PAPER_DIMS[size].w + 'mm'); root.style.setProperty('--page-height', PAPER_DIMS[size].h + 'mm'); }
        saveState();
    }
    
    function changeFormat() { markDirty(); state.format = document.getElementById('format-select').value; renderTable(); saveState(); }

    function processData() {
        markDirty();
        syncTableToState();
        
        const rawData = document.getElementById('combined-text').value.trim();
        if(!rawData) return; 

        if (state.data.length === 1 && state.data[0].khata === '' && state.data[0].khasras[0].k === '') {
            state.data = [];
        }

        const blocks = rawData.split(/========================================/);
        let firstVillage = null;
        let addedCount = 0;

        blocks.forEach(block => {
            let text = block.trim();
            if(!text) return; 
            let villageMatch = text.match(/ग्राम (.*?) स्थित/);
            if(villageMatch && !firstVillage) firstVillage = villageMatch[1].trim(); 
            let khataMatch = text.match(/खाता क्रमांक (\d+)/);
            let khata = khataMatch ? khataMatch[1] : '';
            const khasraRegex = /(\d+[\/\d]*)\s*रकवा\s*([\d\.]+)/g;
            let khasras = []; let match;
            while ((match = khasraRegex.exec(text)) !== null) khasras.push({ k: match[1], r: parseFloat(match[2]).toFixed(4) }); 
            if(khasras.length === 0) khasras.push({k: '', r: ''});
            let owners = ''; let ownerIndex = text.indexOf('भूमिस्वामी विवरण:');
            if(ownerIndex !== -1) owners = text.substring(ownerIndex + 17).trim(); 
            let newData = { khata: khata, owners: owners, khasras: khasras };
            
            if (activeKhata !== null && blocks.length === 1) state.data.splice(activeKhata + 1, 0, newData); 
            else state.data.push(newData); 
            addedCount++;
        });

        if(firstVillage) document.getElementById('village-name').innerText = firstVillage;
        document.getElementById('combined-text').value = '';
        renderTable();
        saveState();
    }

    function renderTable() { buildColgroup(); buildHeader(); buildBody(); calculateTotals(); attachResizers(); }

    function buildColgroup() {
        const colgroup = document.getElementById('table-colgroup'); colgroup.innerHTML = '';
        let allCols = [...getCurrentCols()];
        for(let s=0; s<state.proposedSets; s++) allCols = allCols.concat(getProposedCols(s));
        allCols.forEach((col, index) => {
            const c = document.createElement('col');
            if(col.link) c.setAttribute('data-link', col.link); 
            let widthKey = col.link ? col.link : 'col_'+index; 
            if(!state.colsWidth[widthKey]) state.colsWidth[widthKey] = col.w;
            c.style.width = state.colsWidth[widthKey] + 'px'; colgroup.appendChild(c);
        });
    }

    function buildHeader() {
        const thead = document.getElementById('table-head');
        let currentCols = getCurrentCols(); let html = ''; let totalProposedCols = 0;
        for(let s=0; s<state.proposedSets; s++) totalProposedCols += getProposedCols(s).length;
        html += `<tr><th colspan="${currentCols.length}" class="header-bg">वर्तमान अभिलेखीय स्थिति</th><th colspan="${totalProposedCols}" class="header-bg">प्रस्तावित विभाजन सूची</th></tr><tr>`;
        let hasOwnerHeader = false;
        for(let s=0; s<state.proposedSets; s++) { if(getProposedCols(s).length === 2) hasOwnerHeader = true; }
        let colIndexTracker = 0;
        if (hasOwnerHeader) {
            currentCols.forEach((c) => { html += `<th rowspan="2">${c.n}<div class="resizer" data-col="${colIndexTracker++}"></div></th>`; });
            let tempColTracker = colIndexTracker;
            for(let s=0; s<state.proposedSets; s++) {
                let pCols = getProposedCols(s);
                if(pCols.length === 2) { 
                    let savedOwner = (state.headerOwners && state.headerOwners[s]) ? state.headerOwners[s] : 'यहाँ भूमि स्वामी का नाम लिखें';
                    html += `<th colspan="2" class="header-bg owner-header" contenteditable="true" data-header-set="${s}">${savedOwner}</th>`;
                    tempColTracker += 2;
                } else { 
                    pCols.forEach(c => { html += `<th rowspan="2">${c.n}<div class="resizer" data-col="${tempColTracker++}"></div></th>`; });
                }
            }
            html += `</tr><tr>`;
            let bottomColTracker = currentCols.length;
            for(let s=0; s<state.proposedSets; s++) {
                let pCols = getProposedCols(s);
                if(pCols.length === 2) { pCols.forEach(c => { html += `<th>${c.n}<div class="resizer" data-col="${bottomColTracker++}"></div></th>`; }); } 
                else { bottomColTracker += pCols.length; }
            }
            html += `</tr>`;
        } else {
            currentCols.forEach((c) => { html += `<th>${c.n}<div class="resizer" data-col="${colIndexTracker++}"></div></th>`; });
            for(let s=0; s<state.proposedSets; s++) { getProposedCols(s).forEach(c => { html += `<th>${c.n}<div class="resizer" data-col="${colIndexTracker++}"></div></th>`; }); }
            html += `</tr>`;
        }
        let totalCols = currentCols.length + totalProposedCols;
        html += `<tr class="header-bg">`;
        for(let i = 1; i <= totalCols; i++) html += `<td>(${i})</td>`; 
        html += `</tr>`; thead.innerHTML = html;
    }

    function buildBody() {
        const tbody = document.getElementById('table-body'); tbody.innerHTML = '';
        function getUI(khasraObj, field, setIdx, defaultHide, defaultRS) {
            let uiObj = (setIdx === '') ? (khasraObj.c_ui && khasraObj.c_ui[field]) : (khasraObj.p_ui && khasraObj.p_ui[setIdx] && khasraObj.p_ui[setIdx][field]);
            let disp = uiObj && uiObj.disp !== undefined ? uiObj.disp : (defaultHide ? 'none' : '');
            let rs = uiObj && uiObj.rs !== undefined ? uiObj.rs : defaultRS;
            let ta = uiObj && uiObj.ta !== undefined ? uiObj.ta : (field.includes('owner') ? 'left' : 'center');
            let hStyle = khasraObj.h ? `height:${khasraObj.h}px;` : ''; let style = `text-align:${ta}; ${hStyle}`;
            if (disp) style += ` display:${disp};`;
            return { style, rsAttr: rs > 1 ? `rowspan="${rs}"` : '' };
        }

        state.data.forEach((item, index) => {
            const rowCount = item.khasras.length;
            item.khasras.forEach((khasra, kIndex) => {
                const tr = document.createElement('tr');
                tr.setAttribute('data-khata-idx', index); tr.setAttribute('data-khasra-idx', kIndex);
                tr.setAttribute('data-orig-khasra', khasra.k); tr.setAttribute('data-orig-rakba', khasra.r);
                if (khasra.h) tr.style.height = khasra.h + 'px'; 
                let colIdx = 0;
                if(state.hasGram) {
                    let ui = getUI(khasra, 'gram', '', kIndex !== 0, rowCount);
                    tr.innerHTML += `<td contenteditable="true" data-field="gram" data-set="" data-col-index="${colIdx++}" ${ui.rsAttr} style="${ui.style}">${item.gram || ''}</td>`;
                }
                let uiSno = getUI(khasra, 'sno', '', kIndex !== 0, rowCount);
                tr.innerHTML += `<td contenteditable="true" data-field="sno" data-set="" data-col-index="${colIdx++}" ${uiSno.rsAttr} style="${uiSno.style}">${index + 1}</td>`;
                
                let uiKhata = getUI(khasra, 'khata', '', kIndex !== 0, rowCount);
                tr.innerHTML += `<td contenteditable="true" data-field="khata" data-set="" data-col-index="${colIdx++}" ${uiKhata.rsAttr} style="${uiKhata.style}">${item.khata || ''}</td>`;
                
                let uiKhasra = getUI(khasra, 'khasra', '', false, 1);
                tr.innerHTML += `<td contenteditable="true" data-field="khasra" data-set="" data-col-index="${colIdx++}" ${uiKhasra.rsAttr} style="${uiKhasra.style}">${khasra.k || ''}</td>`;
                
                let uiRakba = getUI(khasra, 'rakba', '', false, 1);
                tr.innerHTML += `<td contenteditable="true" data-field="rakba" data-set="" data-col-index="${colIdx++}" class="c-rakba" ${uiRakba.rsAttr} style="${uiRakba.style}">${khasra.r || ''}</td>`;
                
                let uiOwner = getUI(khasra, 'owner', '', kIndex !== 0, rowCount);
                tr.innerHTML += `<td contenteditable="true" data-field="owner" data-set="" data-col-index="${colIdx++}" ${uiOwner.rsAttr} style="${uiOwner.style}">${item.owners || ''}</td>`;

                for (let s = 0; s < state.proposedSets; s++) {
                    let pSet = (khasra.proposed && khasra.proposed[s]) ? khasra.proposed[s] : { k: '', r: '', o: '' };
                    
                    getProposedCols(s).forEach(c => {
                        let field = c.f; 
                        let val = field === 'p_owner' ? (pSet.o || '') : (field === 'p_rakba' ? (pSet.r || '') : (pSet.k || ''));
                        let isOwnerCol = field === 'p_owner';
                        let uiProp = getUI(khasra, field, s, isOwnerCol && kIndex !== 0, isOwnerCol ? rowCount : 1);
                        
                        // === यहाँ बदलाव किया गया है: onblur App.handleRakbaInput को कॉल करेगा ===
                        if (field === 'p_rakba') {
                            tr.innerHTML += `<td contenteditable="true" 
                                                data-field="${field}" 
                                                data-set="${s}" 
                                                data-col-index="${colIdx++}" 
                                                class="${c.cls || ''} p-rakba" 
                                                ${uiProp.rsAttr} 
                                                style="${uiProp.style}"
                                                onblur="App.handleRakbaInput(${index}, ${kIndex}, ${s}, this.innerText)">${val}</td>`;
                        } else {
                            let extraCls = field === 'p_khasra' ? ' p-khasra' : '';
                            tr.innerHTML += `<td contenteditable="true" 
                                                data-field="${field}" 
                                                data-set="${s}" 
                                                data-col-index="${colIdx++}" 
                                                class="${c.cls || ''}${extraCls}" 
                                                ${uiProp.rsAttr} 
                                                style="${uiProp.style}">${val}</td>`;
                        }
                    });
                }
                tbody.appendChild(tr);
            });

            const subTr = document.createElement('tr'); subTr.className = 'subtotal-row'; subTr.style.backgroundColor = '#eef2f5'; subTr.style.fontWeight = 'bold';
            let currentCols = getCurrentCols(); let preKhasraCount = currentCols.findIndex(c => c.f === 'khasra');
            let html = `<td colspan="${preKhasraCount}" style="text-align:right; padding-right:15px; color:#2c3e50;">खाता ${index + 1} का योग:</td>`;
            html += `<td class="sub-kita" style="color:#2c3e50;"></td>`; html += `<td class="sub-rakba" style="color:#2c3e50;"></td>`; 
            for(let i = preKhasraCount + 2; i < currentCols.length; i++) html += `<td></td>`;
            for(let s=0; s<state.proposedSets; s++) {
                getProposedCols(s).forEach(c => {
                    if (c.f === 'p_khasra') html += `<td class="sub-p-kita-${s}" style="color:#2c3e50;"></td>`;
                    else if (c.f === 'p_rakba') html += `<td class="sub-p-rakba-${s}" style="color:#2c3e50;"></td>`;
                    else html += `<td></td>`;
                });
            }
            subTr.innerHTML = html; tbody.appendChild(subTr);
        });
    }

    function attachRowMergeLogic() {
        const tBody = document.getElementById('table-body');
        tBody.addEventListener('dblclick', function(e) {
            let cell = e.target;
            if(cell.tagName === 'TD') {
                markDirty();
                let rs = parseInt(cell.getAttribute('rowspan')) || 1; let colIdx = cell.getAttribute('data-col-index');
                let tr = cell.parentElement; let nextRow = tr.nextElementSibling;
                while(nextRow) {
                    let nextCell = nextRow.querySelector(`td[data-col-index="${colIdx}"]`);
                    if(nextCell && nextCell.style.display !== 'none') {
                        nextCell.style.display = 'none';
                        let nextRs = parseInt(nextCell.getAttribute('rowspan')) || 1;
                        cell.setAttribute('rowspan', rs + nextRs); break; 
                    }
                    nextRow = nextRow.nextElementSibling;
                }
                saveState();
            }
        });

        tBody.addEventListener('contextmenu', function(e) {
            let cell = e.target;
            if(cell.tagName === 'TD') {
                let rs = parseInt(cell.getAttribute('rowspan')) || 1;
                if(rs > 1) {
                    markDirty(); e.preventDefault(); 
                    let colIdx = cell.getAttribute('data-col-index'); let tr = cell.parentElement;
                    cell.setAttribute('rowspan', rs - 1); let targetRow = tr;
                    for(let i = 0; i < rs - 1; i++) { if(targetRow) targetRow = targetRow.nextElementSibling; }
                    if(targetRow) { let hiddenCell = targetRow.querySelector(`td[data-col-index="${colIdx}"]`); if(hiddenCell) hiddenCell.style.display = ''; }
                    saveState();
                }
            }
        });
    }

    function attachLiveCalculations() {
        document.getElementById('table-body').addEventListener('focusout', function(e) {
            if (e.target.classList.contains('p-rakba') || e.target.classList.contains('c-rakba')) {
                let nodeVal = getCleanText(e.target);
                if (e.target.classList.contains('p-rakba') && nodeVal.includes('/')) {
                    let parts = nodeVal.split('/');
                    if(parts.length === 2 && !isNaN(parts[0]) && !isNaN(parts[1]) && parts[1] !== '0') {
                        let row = e.target.closest('tr'); let origRakba = parseFloat(row.getAttribute('data-orig-rakba')) || 0;
                        let fractionVal = origRakba * (parseFloat(parts[0]) / parseFloat(parts[1]));
                        e.target.innerText = fractionVal.toFixed(4); calculateTotals(); saveState(); return;
                    }
                }
                let val = parseFloat(nodeVal);
                if(!isNaN(val)) e.target.innerText = val.toFixed(4);
                calculateTotals();
            }
        });

        // इसे रोक दिया गया है ताकि ये नए लॉजिक के साथ क्लैश न करे
        /*
        document.getElementById('table-body').addEventListener('input', function(e) {
            markDirty();
            if (e.target.classList.contains('p-rakba') || e.target.classList.contains('c-rakba')) {
                // ... पुराना ऑटो खसरा लॉजिक ...
            }
        });
        */
    }

    function calculateTotals() {
        const tbody = document.getElementById('table-body');
        const rows = Array.from(tbody.querySelectorAll('tr'));
        const tfoot = document.getElementById('table-foot');
        let currentCols = getCurrentCols();
        
        let khataKita = 0, khataRakba = 0.0, khataProposedRakba = 0.0;
        let khataProposedTotals = Array(state.proposedSets).fill().map(() => ({kita: 0, rakba: 0.0}));

        let grandKita = 0, grandRakba = 0.0, grandGlobalProposedRakba = 0.0;
        let grandProposedTotals = Array(state.proposedSets).fill().map(() => ({kita: 0, rakba: 0.0}));

        for (let i = 0; i < rows.length; i++) {
            let row = rows[i];
            if (row.classList.contains('subtotal-row')) {
                row.querySelector('.sub-kita').innerText = `किता ${khataKita}`;
                
                // === सुधार 1: खाते के योग में सटीक 4 डिजिट का अंतर ===
                let gDiff = Number((khataRakba - khataProposedRakba).toFixed(4)); 
                let gDiffHtml = '';
                if(khataRakba > 0) {
                    if (gDiff === 0) gDiffHtml = `<span class="total-diff" style="color:green; display:block; margin-top:4px;">(शेष: 0.0000)</span>`;
                    else if (gDiff > 0) gDiffHtml = `<span class="total-diff" style="color:blue; display:block; margin-top:4px;">(शेष: ${gDiff.toFixed(4)})</span>`;
                    else gDiffHtml = `<span class="total-diff" style="color:red; display:block; margin-top:4px;">(अधिक: ${Math.abs(gDiff).toFixed(4)})</span>`;
                }
                row.querySelector('.sub-rakba').innerHTML = `${khataRakba.toFixed(4)} ${gDiffHtml}`;
                khataProposedTotals.forEach((pt, sIndex) => {
                    let kCell = row.querySelector(`.sub-p-kita-${sIndex}`); if(kCell) kCell.innerText = `किता ${pt.kita}`;
                    let rCell = row.querySelector(`.sub-p-rakba-${sIndex}`); if(rCell) rCell.innerText = pt.rakba.toFixed(4);
                });
                khataKita = 0; khataRakba = 0.0; khataProposedRakba = 0.0;
                khataProposedTotals = Array(state.proposedSets).fill().map(() => ({kita: 0, rakba: 0.0}));
                continue; 
            }

            let cRakbaCell = row.querySelector('.c-rakba');
            if (cRakbaCell && cRakbaCell.style.display !== 'none') {
                let rs = parseInt(cRakbaCell.getAttribute('rowspan')) || 1;
                let rVal = parseFloat(getCleanText(cRakbaCell)) || 0;
                
                if (!isNaN(rVal) && rVal > 0) { khataRakba += rVal; khataKita++; grandRakba += rVal; grandKita++; }

                let groupProposedSums = Array(state.proposedSets).fill(0);
                for (let j = 0; j < rs; j++) {
                    if (i + j < rows.length) {
                        let subRow = rows[i + j];
                        let pRakbas = subRow.querySelectorAll('.p-rakba');
                        pRakbas.forEach((td, idx) => {
                            if (td.style.display !== 'none') {
                                let val = parseFloat(getCleanText(td)) || 0;
                                if (!isNaN(val) && val > 0) {
                                    groupProposedSums[idx] += val;
                                    khataProposedTotals[idx].rakba += val; khataProposedTotals[idx].kita++; khataProposedRakba += val;
                                    grandProposedTotals[idx].rakba += val; grandProposedTotals[idx].kita++; grandGlobalProposedRakba += val;
                                }
                            }
                        });
                    }
                }

                if (rVal > 0) {
                    let totalGroupProposedSum = groupProposedSums.reduce((a, b) => a + b, 0);
                    
                    // === सुधार 2: प्रत्येक रो में सटीक 4 डिजिट का अंतर ===
                    let diff = Number((rVal - totalGroupProposedSum).toFixed(4)); 
                    let diffHtml = '';
                    if(diff === 0) { diffHtml = `<span class="row-diff" style="color:green; display:block; margin-top:4px;">(शेष: 0.0000)</span>`; row.classList.remove('error-row'); }
                    else if (diff > 0) { diffHtml = `<span class="row-diff" style="color:blue; display:block; margin-top:4px;">(शेष: ${diff.toFixed(4)})</span>`; row.classList.remove('error-row'); }
                    else { diffHtml = `<span class="row-diff" style="color:red; display:block; margin-top:4px;">(अधिक: ${Math.abs(diff).toFixed(4)})</span>`; row.classList.add('error-row'); }
                    
                    cRakbaCell.querySelectorAll('.row-diff').forEach(e => e.remove());
                    cRakbaCell.insertAdjacentHTML('beforeend', diffHtml);
                }
            }
        }

        if (state.data.length > 1) {
            
            // === सुधार 3: महायोग (Grand Total) में सटीक 4 डिजिट का अंतर ===
            let gDiff = Number((grandRakba - grandGlobalProposedRakba).toFixed(4)); 
            let gDiffHtml = '';
            if(grandRakba > 0) {
                if (gDiff === 0) gDiffHtml = `<span class="total-diff" style="color:green; display:block; margin-top:4px;">(शेष: 0.0000)</span>`;
                else if (gDiff > 0) gDiffHtml = `<span class="total-diff" style="color:blue; display:block; margin-top:4px;">(शेष: ${gDiff.toFixed(4)})</span>`;
                else gDiffHtml = `<span class="total-diff" style="color:red; display:block; margin-top:4px;">(अधिक: ${Math.abs(gDiff).toFixed(4)})</span>`;
            }
            let html = `<tr class="total-row" style="background:#d1d8e0; font-size: 14px;">`;
            let preKhasraCount = currentCols.findIndex(c => c.f === 'khasra');
            html += `<td colspan="${preKhasraCount}" style="text-align:right; padding-right:15px;">महायोग (Grand Total)</td>`;
            html += `<td>किता ${grandKita}</td>`; html += `<td style="line-height: 1.2;">${grandRakba.toFixed(4)} ${gDiffHtml}</td>`;
            for(let i = preKhasraCount + 2; i < currentCols.length; i++) html += `<td></td>`;
            grandProposedTotals.forEach((pt, sIndex) => {
                getProposedCols(sIndex).forEach(c => {
                    if (c.f === 'p_khasra') html += `<td>किता ${pt.kita}</td>`;
                    else if (c.f === 'p_rakba') html += `<td>${pt.rakba.toFixed(4)}</td>`;
                    else html += `<td></td>`;
                });
            });
            html += `</tr>`; tfoot.innerHTML = html;
        } else { tfoot.innerHTML = ''; }
    }

    let dragCol = null, startX = 0, startW = 0, linkType = null;
    function attachResizers() {
        document.querySelectorAll('.resizer').forEach(r => {
            r.addEventListener('mousedown', function(e) {
                markDirty();
                let colIndex = this.getAttribute('data-col'); dragCol = document.getElementById('table-colgroup').children[colIndex];
                linkType = dragCol.getAttribute('data-link'); startX = e.pageX; startW = parseInt(dragCol.style.width);
                document.addEventListener('mousemove', onMouseMove); document.addEventListener('mouseup', onMouseUp);
            });
        });
    }

    function onMouseMove(e) {
        if(dragCol) {
            let newWidth = startW + (e.pageX - startX);
            if(newWidth > 20) {
                if(linkType) { document.querySelectorAll(`col[data-link="${linkType}"]`).forEach(c => c.style.width = newWidth + 'px'); state.colsWidth[linkType] = newWidth; } 
                else { dragCol.style.width = newWidth + 'px'; let colIndex = Array.from(dragCol.parentNode.children).indexOf(dragCol); state.colsWidth['col_'+colIndex] = newWidth; }
            }
        }
    }
    
    function onMouseUp() { 
        if(dragCol) saveState();
        dragCol = null; linkType = null; document.removeEventListener('mousemove', onMouseMove); document.removeEventListener('mouseup', onMouseUp); 
    }

    function attachRowResizer() {
        const tbody = document.getElementById('table-body');
        let isResizingRow = false; let currentDragRow = null; let startY = 0; let startH = 0;

        document.addEventListener('mousemove', function(e) {
            if(isResizingRow && currentDragRow) {
                let newHeight = startH + (e.pageY - startY);
                if(newHeight > 25) { currentDragRow.style.height = newHeight + 'px'; }
                e.preventDefault(); 
            } else {
                let target = e.target.closest('td');
                if(target && tbody.contains(target)) {
                    let rect = target.getBoundingClientRect();
                    if (e.clientY >= rect.bottom - 6 && e.clientY <= rect.bottom + 2) target.style.cursor = 'row-resize';
                    else target.style.cursor = ''; 
                }
            }
        });

        document.addEventListener('mousedown', function(e) {
            let target = e.target.closest('td');
            if(target && tbody.contains(target)) {
                let rect = target.getBoundingClientRect();
                if (e.clientY >= rect.bottom - 6 && e.clientY <= rect.bottom + 2) {
                    isResizingRow = true; currentDragRow = target.parentElement;
                    startY = e.pageY; startH = currentDragRow.getBoundingClientRect().height;
                    markDirty(); e.preventDefault(); 
                }
            }
        });

        document.addEventListener('mouseup', function() {
            if(isResizingRow) { isResizingRow = false; currentDragRow = null; saveState(); }
        });
    }

    return { 
        init, changeFormat, changePaperSize, changeFont, toggleGramColumn, 
        processData, openFile, saveFile, saveAsFile, createNewFile, 
        exportToExcel, actionKhata, actionSet, actionRow, markDirty,
        undo, redo, handleRakbaInput 
        // ^^^ यहाँ handleRakbaInput को एक्सपोर्ट किया गया है
    };
})();

window.onload = App.init;
</script>
